server:
  port: 8080

spring:
  application:
    name: base-ai-backend
  config:
    import: optional:file:${TRACE_TRACKING_EXCLUSIONS_FILE:/app/config/trace-tracking-exclusions.yml}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5s}
      repositories:
        enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:system-schema.sql

app:
  logging:
    root-level: ${LOG_LEVEL:INFO}
    console-queue-capacity: ${LOG_CONSOLE_QUEUE_CAPACITY:8192}
  platform:
    code: ${APP_PLATFORM_CODE:ai-platform}
    name-en: ${APP_PLATFORM_NAME_EN:AI Platform}
    name-zh: ${APP_PLATFORM_NAME_ZH:AI平台}
    short-name: ${APP_PLATFORM_SHORT_NAME:AI}
  config-encryption-key: ${APP_CONFIG_ENCRYPTION_KEY}
  mysql-database:
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    maximum-pool-size: 20
  postgresql-database:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    maximum-pool-size: ${POSTGRES_POOL_SIZE:10}
  token:
    secret: ${APP_TOKEN_SECRET}
    expire-minutes: ${APP_TOKEN_EXPIRE_MINUTES:720}
  seed:
    admin-username: ${APP_SEED_ADMIN_USERNAME:admin}
    admin-password: ${APP_SEED_ADMIN_PASSWORD}
  python-worker:
    url: ${PYTHON_WORKER_URL:http://python-worker:8000}
    internal-token: ${PYTHON_WORKER_INTERNAL_TOKEN}
    java-instance-id: ${JAVA_INSTANCE_ID:java-backend-1}
  trace-log:
    queue-capacity: ${TRACE_LOG_QUEUE_CAPACITY:10000}
    batch-size: ${TRACE_LOG_BATCH_SIZE:100}
    flush-interval-ms: ${TRACE_LOG_FLUSH_INTERVAL_MS:500}
    persist-level: ${TRACE_LOG_PERSIST_LEVEL:INFO}
    retention-days: ${TRACE_LOG_RETENTION_DAYS:7}
  trace-tracking:
    heartbeat-timeout-seconds: ${TRACE_HEARTBEAT_TIMEOUT_SECONDS:120}
    excluded-methods: GET,OPTIONS
    excluded-paths:
      - /api/auth/**
      - /api/open/**
      - /api/internal/**
      - /api/system/tasks/**
  api-trigger:
    allowed-hosts: ${API_TRIGGER_ALLOWED_HOSTS}
    allow-private-network: ${API_TRIGGER_ALLOW_PRIVATE_NETWORK:false}
    scheduler-pool-size: ${API_TRIGGER_SCHEDULER_POOL_SIZE:4}
    lock-seconds: ${API_TRIGGER_LOCK_SECONDS:300}
    result-max-length: ${API_TRIGGER_RESULT_MAX_LENGTH:2000}
