group_pools:
  qianwen:
    base_url: https://example.com/compatible-mode/v1
    api_keys:
      - replace-with-api-key-1
      - replace-with-api-key-2
    text_model:
      low:
        model: replace-with-low-model
      middle:
        model: replace-with-middle-model
        thinking_levels:
          low: low
          extra_high: xhigh
      high:
        model: replace-with-high-model
    vision_model:
      low: replace-with-low-vision-model
      middle: replace-with-middle-vision-model
      high: replace-with-high-vision-model
    custom_model:
      custom_level: replace-with-custom-model
    concurrency: 4
    concurrency_level: api-key
    concurrency_mode: qps
    thinking_parameter: reasoning_effort
