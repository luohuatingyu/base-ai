name: ${COMPOSE_PROJECT_NAME:?Set COMPOSE_PROJECT_NAME}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: ${CONTAINER_LOG_MAX_SIZE:-20m}
    max-file: ${CONTAINER_LOG_MAX_FILES:-5}

services:
  backend:
    build:
      context: ./backend
      args:
        MAVEN_IMAGE: ${MAVEN_IMAGE:-maven:3.9.9-eclipse-temurin-17}
        JRE_IMAGE: ${JRE_IMAGE:-eclipse-temurin:17-jre}
    image: ${COMPOSE_PROJECT_NAME:?Set COMPOSE_PROJECT_NAME}-backend:latest
    restart: unless-stopped
    logging: *default-logging
    environment:
      MYSQL_URL: ${MYSQL_URL:?Set MYSQL_URL}
      MYSQL_USERNAME: ${MYSQL_USERNAME:?Set MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD}
      POSTGRES_URL: ${POSTGRES_URL:?Set POSTGRES_URL}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:?Set POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_POOL_SIZE: ${POSTGRES_POOL_SIZE:-10}
      REDIS_HOST: ${REDIS_HOST:?Set REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      REDIS_TIMEOUT: ${REDIS_TIMEOUT:-5s}
      APP_TOKEN_SECRET: ${APP_TOKEN_SECRET:?Set APP_TOKEN_SECRET}
      APP_PLATFORM_CODE: ${APP_PLATFORM_CODE:-ai-platform}
      APP_PLATFORM_NAME_EN: ${APP_PLATFORM_NAME_EN:-AI Platform}
      APP_PLATFORM_NAME_ZH: ${APP_PLATFORM_NAME_ZH:-AI平台}
      APP_PLATFORM_SHORT_NAME: ${APP_PLATFORM_SHORT_NAME:-AI}
      APP_TOKEN_EXPIRE_MINUTES: ${APP_TOKEN_EXPIRE_MINUTES:-720}
      APP_SEED_ADMIN_USERNAME: ${APP_SEED_ADMIN_USERNAME:-admin}
      APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD:?Set APP_SEED_ADMIN_PASSWORD}
      APP_CONFIG_ENCRYPTION_KEY: ${APP_CONFIG_ENCRYPTION_KEY:?Set APP_CONFIG_ENCRYPTION_KEY}
      PYTHON_WORKER_URL: ${PYTHON_WORKER_URL:-http://python-worker:8000}
      PYTHON_WORKER_INTERNAL_TOKEN: ${PYTHON_WORKER_INTERNAL_TOKEN:?Set PYTHON_WORKER_INTERNAL_TOKEN}
      JAVA_INSTANCE_ID: ${JAVA_INSTANCE_ID:-java-backend-1}
      TRACE_LOG_PERSIST_LEVEL: ${TRACE_LOG_PERSIST_LEVEL:-INFO}
      TRACE_LOG_QUEUE_CAPACITY: ${TRACE_LOG_QUEUE_CAPACITY:-10000}
      TRACE_LOG_BATCH_SIZE: ${TRACE_LOG_BATCH_SIZE:-100}
      TRACE_LOG_FLUSH_INTERVAL_MS: ${TRACE_LOG_FLUSH_INTERVAL_MS:-500}
      TRACE_LOG_RETENTION_DAYS: ${TRACE_LOG_RETENTION_DAYS:-7}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_CONSOLE_QUEUE_CAPACITY: ${LOG_CONSOLE_QUEUE_CAPACITY:-8192}
      TRACE_HEARTBEAT_TIMEOUT_SECONDS: ${TRACE_HEARTBEAT_TIMEOUT_SECONDS:-120}
      TRACE_TRACKING_EXCLUSIONS_FILE: /app/config/trace-tracking-exclusions.yml
      API_TRIGGER_ALLOWED_HOSTS: ${API_TRIGGER_ALLOWED_HOSTS:?Set API_TRIGGER_ALLOWED_HOSTS}
      API_TRIGGER_ALLOW_PRIVATE_NETWORK: ${API_TRIGGER_ALLOW_PRIVATE_NETWORK:-false}
      API_TRIGGER_SCHEDULER_POOL_SIZE: ${API_TRIGGER_SCHEDULER_POOL_SIZE:-4}
      API_TRIGGER_LOCK_SECONDS: ${API_TRIGGER_LOCK_SECONDS:-300}
      API_TRIGGER_RESULT_MAX_LENGTH: ${API_TRIGGER_RESULT_MAX_LENGTH:-2000}
    volumes:
      - ${TRACE_TRACKING_EXCLUSIONS_FILE:-./trace-tracking-exclusions.yml}:/app/config/trace-tracking-exclusions.yml:ro
    depends_on:
      python-worker:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/open/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    stop_signal: SIGTERM
    stop_grace_period: 20s
    networks:
      - app-network

  python-worker:
    build:
      context: ./python-worker
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
    image: ${COMPOSE_PROJECT_NAME:?Set COMPOSE_PROJECT_NAME}-python-worker:latest
    restart: unless-stopped
    logging: *default-logging
    environment:
      BACKEND_URL: http://backend:8080
      PYTHON_WORKER_INTERNAL_TOKEN: ${PYTHON_WORKER_INTERNAL_TOKEN:?Set PYTHON_WORKER_INTERNAL_TOKEN}
      PYTHON_WORKER_INSTANCE_ID: ${PYTHON_WORKER_INSTANCE_ID:-python-worker-1}
      APP_PLATFORM_NAME_EN: ${APP_PLATFORM_NAME_EN:-AI Platform}
      AI_MODEL_POOLS_FILE: /app/config/ai-model-pools.yml
      AI_FEATURE_ROUTING_FILE: /app/config/ai-feature-routing.yml
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      LLM_LOG_CONTENT: ${LLM_LOG_CONTENT:-true}
      TRACE_LOG_PERSIST_LEVEL: ${TRACE_LOG_PERSIST_LEVEL:-INFO}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ${AI_MODEL_POOLS_FILE:-./ai-model-pools.yml}:/app/config/ai-model-pools.yml:ro
      - ${AI_FEATURE_ROUTING_FILE:-./ai-feature-routing.yml}:/app/config/ai-feature-routing.yml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
    stop_signal: SIGTERM
    stop_grace_period: 20s
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:24-alpine}
    image: ${COMPOSE_PROJECT_NAME:?Set COMPOSE_PROJECT_NAME}-frontend:latest
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: ${FRONTEND_BACKEND_URL:-http://backend:8080}
      APP_PLATFORM_CODE: ${APP_PLATFORM_CODE:-ai-platform}
      APP_PLATFORM_NAME_EN: ${APP_PLATFORM_NAME_EN:-AI Platform}
      APP_PLATFORM_NAME_ZH: ${APP_PLATFORM_NAME_ZH:-AI平台}
      APP_PLATFORM_SHORT_NAME: ${APP_PLATFORM_SHORT_NAME:-AI}
      PORT: 80
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
